<h1>绘世 Draw My World 使用帮助</h1>
<p>绘世是一款面向 Minecraft 基岩版的图片转方块与命令生成工具。</p>

<h2>如何使用？</h2>
<ol>
<li>导入图片。</li>
<li>选择输出尺寸。</li>
<li>选择颜色算法和方块调色板。</li>
<li>查看最终效果预览。</li>
<li>导出命令或函数文件。</li>
</ol>

<h2>常见问题</h2>
<h3>绘世支持哪个版本？</h3>
<p>当前主要支持 Minecraft 基岩版。</p>

<h3>图片会上传服务器吗？</h3>
<p>默认情况下图片在浏览器本地处理。</p>
