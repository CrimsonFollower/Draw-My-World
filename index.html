<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <meta name="color-scheme" content="dark light">
  <title>绘世 Draw My World</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #16101d;
      --panel: #24192e;
      --line: #634b76;
      --text: #f7efff;
      --muted: #c9bbd4;
      --accent-1: #7654a0;
      --accent-2: #a66fc1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family:
        system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, #39234a 0, transparent 38%),
        radial-gradient(circle at 80% 85%, #291c37 0, transparent 36%),
        var(--bg);
    }

    main {
      width: min(440px, 100%);
      padding: clamp(24px, 6vw, 38px);
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(36, 25, 46, 0.92);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.12;
    }

    p {
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: block;
      margin-top: 26px;
      padding: 15px 20px;
      border-radius: 15px;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 10px 28px rgba(118, 84, 160, 0.34);
    }

    a:focus-visible {
      outline: 3px solid #d6b7ed;
      outline-offset: 4px;
    }

    small {
      display: block;
      margin-top: 16px;
      color: var(--muted);
      line-height: 1.55;
    }
  </style>
</head>

<body>
  <main>
    <h1>绘世</h1>
    <p>Draw My World</p>
    <p>面向 Minecraft 基岩版的图片转命令方块绘画平台。</p>

    <a href="./bedrock_drawmyworld.html">
      打开绘世
    </a>

    <small>
      github在中国国内加载需要大量时间，手机使用可能需要5分钟。
    </small>
  </main>
</body>
</html>
